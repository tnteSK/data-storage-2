<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; }
        #log { border: 1px solid #0f0; height: 400px; overflow: auto; padding: 10px; }
    </style>
</head>
<body>
    <div id="status">Status: Checking...</div>
    <div id="log"></div>
    <script>
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        async function start() {
            try {
                const res = await fetch(`cloudflared_link.txt?t=${Date.now()}`);
                if (!res.ok) throw new Error("File not found");
                const url = (await res.text()).trim();
                
                status.innerText = "Connecting: " + url;
                const ws = new WebSocket(url);

                ws.onopen = () => status.innerText = "ONLINE";
                ws.onmessage = (e) => {
                    const div = document.createElement('div');
                    div.innerText = "> " + e.data;
                    log.appendChild(div);
                };
                ws.onclose = () => setTimeout(start, 5000);
            } catch (e) {
                setTimeout(start, 2000);
            }
        }
        start();
    </script>
</body>
</html>
